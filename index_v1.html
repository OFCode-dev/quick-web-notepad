<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Web Notepad</title>
<meta name="description" content="A fast, distraction-free plain text editor. Works offline, supports multiple languages.">
<meta name="author" content="OFCode">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'&gt;&lt;rect x='2' y='3' width='32' height='22' rx='2' fill='%23444'/&gt;&lt;rect x='4' y='5' width='28' height='18' rx='1' fill='%231a2a1a'/&gt;&lt;line x1='7' y1='10' x2='24' y2='10' stroke='%236aff6a' stroke-width='1.2' stroke-linecap='round'/&gt;&lt;line x1='7' y1='13.5' x2='22' y2='13.5' stroke='%236aff6a' stroke-width='1.2' stroke-linecap='round'/&gt;&lt;line x1='7' y1='17' x2='19' y2='17' stroke='%236aff6a' stroke-width='1.2' stroke-linecap='round'/&gt;&lt;rect x='19.5' y='15.5' width='1.2' height='3' fill='%23f5a623'/&gt;&lt;rect x='15' y='25' width='6' height='4' fill='%23555'/&gt;&lt;rect x='11' y='29' width='14' height='2.5' rx='1' fill='%23555'/&gt;&lt;/svg&gt;">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ───────────────────────────────────────────── */
:root {
  --bg:           #f5f5f5;
  --surface:      #ffffff;
  --toolbar:      #f3f3f3;
  --toolbar-b:    #e0e0e0;
  --border:       #e8e8e8;
  --text:         #1e1e1e;
  --text2:        #6e7681;
  --accent:       #0066cc;
  --accent-bg:    rgba(0,102,204,.10);
  --btn-hover:    rgba(0,0,0,.06);
  --editor:       #ffffff;
  --lnum-bg:      #f8f8f8;
  --lnum-text:    #a8a8a8;
  --findbar:      #ebebeb;
  --sb-bg:        #007acc;
  --sb-text:      #ffffff;
  --header:       #1e1e1e;
  --header-text:  #cccccc;
  --protect-col:  #e87d0d;
  --syntax-col:   #8c64c8;
  --shadow:       0 1px 3px rgba(0,0,0,.10);
}
.dark {
  --bg:           #1e1e1e;
  --surface:      #1e1e1e;
  --toolbar:      #2d2d2d;
  --toolbar-b:    #3e3e42;
  --border:       #3e3e42;
  --text:         #d4d4d4;
  --text2:        #858585;
  --accent:       #4fc1ff;
  --accent-bg:    rgba(79,193,255,.12);
  --btn-hover:    rgba(255,255,255,.07);
  --editor:       #1e1e1e;
  --lnum-bg:      #1e1e1e;
  --lnum-text:    #505050;
  --findbar:      #252526;
  --sb-bg:        #007acc;
  --sb-text:      #ffffff;
  --header:       #111111;
  --header-text:  #aaaaaa;
  --protect-col:  #e87d0d;
  --syntax-col:   #b08ae0;
  --shadow:       0 1px 3px rgba(0,0,0,.35);
}

/* ── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: background .15s, color .15s;
}

/* ── WEB HEADER (hidden in Electron) ─────────────────────── */
#app-header {
  background: var(--header);
  height: 42px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  flex-shrink: 0;
  border-bottom: 2px solid #f5a623;
}
.is-electron #app-header { display: none; }

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #fff;
}
.logo svg { width: 22px; height: 22px; flex-shrink: 0; }
.logo em { color: #f5a623; font-style: normal; }

#lang-wrap { margin-left: auto; }
#ui-lang {
  background: #333;
  color: #ccc;
  border: 1px solid #555;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  outline: none;
}
#ui-lang:focus { border-color: var(--accent); }

/* ── APP CONTAINER ───────────────────────────────────────── */
#app {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

/* ── TOOLBAR ─────────────────────────────────────────────── */
#toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 1px;
  padding: 3px 6px;
  background: var(--toolbar);
  border-bottom: 1px solid var(--toolbar-b);
  flex-shrink: 0;
}
#toolbar button {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 9px;
  font-size: 11.5px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  background: transparent;
  color: var(--text);
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .1s, border-color .1s, color .1s;
  line-height: 1.2;
  user-select: none;
}
#toolbar button:hover {
  background: var(--btn-hover);
  border-color: var(--border);
}
#toolbar button.active {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--accent);
}
#toolbar button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: none;
}
#save-btn.has-file {
  background: var(--accent);
  color: #fff !important;
  border-color: var(--accent) !important;
}
#save-btn.has-file:hover { filter: brightness(.9); }

#protect-btn.active {
  background: rgba(232,125,13,.13);
  border-color: var(--protect-col);
  color: var(--protect-col);
}
@keyframes protect-pulse {
  0%,100% { box-shadow: none; }
  40%      { box-shadow: 0 0 0 3px rgba(232,125,13,.55); }
}
#protect-btn.pulse { animation: protect-pulse .35s ease 3; }

@keyframes paste-glow {
  0%,100% { box-shadow: none; border-color: transparent; }
  50%      { box-shadow: 0 0 7px 2px rgba(50,200,100,.45); border-color: rgba(50,200,100,.6); }
}
#paste-btn.glow { animation: paste-glow 2s ease-in-out infinite; }

#copy-sel-btn { transition: opacity .15s; }
#copy-sel-btn:disabled { opacity: 0.28; cursor: not-allowed; pointer-events: none; }

#clear-confirm {
  display: none; align-items: center; gap: 6px;
  padding: 3px 10px; flex-shrink: 0;
  background: rgba(232,125,13,.10);
  border-bottom: 1px solid var(--protect-col);
  font-size: 12px; color: var(--text);
}
#clear-confirm.show { display: flex; }
#clear-confirm span { flex: 1; font-size: 11.5px; }
#clear-confirm button {
  padding: 2px 10px; font-size: 11.5px; border-radius: 4px; cursor: pointer;
  font-family: 'Inter', sans-serif; font-weight: 500; border: 1px solid;
}
#clear-confirm .cc-do   { background: var(--protect-col); color:#fff; border-color: var(--protect-col); }
#clear-confirm .cc-keep { background: transparent; color: var(--text); border-color: var(--border); }
#clear-confirm .cc-do:hover   { filter: brightness(.9); }
#clear-confirm .cc-keep:hover { background: var(--btn-hover); }

#syntax-btn.active {
  background: rgba(140,100,200,.13);
  border-color: var(--syntax-col);
  color: var(--syntax-col);
}

.fname-input {
  padding: 4px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 140px;
  outline: none;
  transition: border-color .15s;
}
.fname-input:focus { border-color: var(--accent); }

#syntax-lang-select {
  display: none;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  padding: 4px 6px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  outline: none;
}
#syntax-lang-select.show { display: inline-block; }
#syntax-lang-select:focus { border-color: var(--accent); }

.tb-sep {
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 3px;
  flex-shrink: 0;
}

/* ── FIND BAR ────────────────────────────────────────────── */
#findbar {
  display: none;
  padding: 4px 8px;
  gap: 5px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--findbar);
  border-bottom: 1px solid var(--toolbar-b);
  flex-shrink: 0;
  font-size: 12px;
}
#findbar.visible { display: flex; }
#findbar label { color: var(--text2); font-size: 11px; white-space: nowrap; }
#findbar input {
  padding: 3px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 160px;
  outline: none;
  transition: border-color .15s;
}
#findbar input:focus { border-color: var(--accent); }
#findbar button {
  padding: 3px 8px;
  font-size: 11.5px;
  font-family: 'Inter', sans-serif;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .1s;
}
#findbar button:hover { background: var(--btn-hover); }
.match-info { font-size: 11px; color: var(--text2); min-width: 80px; }
#findbar .close-btn { margin-left: auto; }
#replace-row { display: none; align-items: center; gap: 5px; flex-wrap: wrap; }
#replace-row.visible { display: flex; }

/* ── EDITOR AREA ─────────────────────────────────────────── */
#editor-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
  background: var(--editor);
  min-height: 0;
  position: relative;
}

#linenums {
  user-select: none;
  background: var(--lnum-bg);
  color: var(--lnum-text);
  padding: 10px 10px 10px 12px;
  text-align: right;
  border-right: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.6em;
  overflow: hidden;
  white-space: pre;
  min-width: 3.2em;
  flex-shrink: 0;
}

#text {
  flex: 1;
  border: none;
  resize: none;
  outline: none;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', Consolas, monospace;
  font-size: 14px;
  line-height: 1.6em;
  white-space: pre;
  overflow-y: scroll;
  overflow-x: auto;
  background: var(--editor);
  color: var(--text);
  caret-color: var(--accent);
  tab-size: 2;
  -moz-tab-size: 2;
  min-width: 0;
  transition: background .15s, color .15s;
}
#text.wrap-mode { white-space: pre-wrap; word-break: break-word; overflow-x: hidden; }
#text:read-only { cursor: default; background: var(--editor); }

/* Syntax highlight view */
#hl-view {
  display: none;
  flex: 1;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', Consolas, monospace;
  font-size: 14px;
  line-height: 1.6em;
  white-space: pre;
  overflow-y: scroll;
  overflow-x: auto;
  background: var(--editor);
  color: var(--text);
  tab-size: 2;
  margin: 0;
  border: none;
  min-width: 0;
  cursor: text;
}
#hl-view.show { display: block; }
#hl-view.wrap-mode { white-space: pre-wrap; word-break: break-word; overflow-x: hidden; }

/* ── STATUS BAR ──────────────────────────────────────────── */
#statusbar {
  height: 22px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  background: var(--sb-bg);
  color: var(--sb-text);
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  flex-shrink: 0;
  gap: 0;
  overflow: hidden;
  white-space: nowrap;
}
#sb-left { flex: 1; overflow: hidden; text-overflow: ellipsis; }
#sb-msg {
  flex-shrink: 0;
  opacity: 0;
  transition: opacity .2s;
  font-weight: 600;
  padding-left: 10px;
}
#sb-msg.show { opacity: 1; }

/* ── SYNTAX TOKEN COLORS ─────────────────────────────────── */
/* Light */
.t-cm { color: #008000; font-style: italic; }
.t-st { color: #a31515; }
.t-kw { color: #0000cc; font-weight: 600; }
.t-bi { color: #267f99; }
.t-nm { color: #098658; }
.t-fn { color: #795e26; }
.t-tg { color: #800000; }
.t-at { color: #e50000; }
.t-pr { color: #0070c1; }
.t-sl { color: #800000; }
/* Dark */
.dark .t-cm { color: #6a9955; }
.dark .t-st { color: #ce9178; }
.dark .t-kw { color: #569cd6; }
.dark .t-bi { color: #4ec9b0; }
.dark .t-nm { color: #b5cea8; }
.dark .t-fn { color: #dcdcaa; }
.dark .t-tg { color: #4ec9b0; }
.dark .t-at { color: #9cdcfe; }
.dark .t-pr { color: #9cdcfe; }
.dark .t-sl { color: #d7ba7d; }

/* ── RTL ─────────────────────────────────────────────────── */
body.rtl #app-header  { flex-direction: row-reverse; }
body.rtl #lang-wrap   { margin-left: 0; margin-right: auto; }
body.rtl #toolbar     { flex-direction: row-reverse; }
body.rtl #findbar     { flex-direction: row-reverse; }
body.rtl #findbar .close-btn { margin-left: 0; margin-right: auto; }
body.rtl #text        { direction: rtl; text-align: right; }
body.rtl #statusbar   { flex-direction: row-reverse; }

/* Mobile hint bar hidden via media query */
@media (hover: none), (max-width: 600px) { #toolbar .tb-hint { display: none; } }
</style>

    <svg viewBox="0 0 36 36" fill="none">
      <rect x="2" y="3" width="32" height="22" rx="2" fill="#444" stroke="#f5a623" stroke-width="1.5"></rect>

    <select id="ui-lang" onchange="applyLang(this.value)" title="UI Language">
      <option value="en">🇬🇧 English</option>

<!-- Main app -->
<div id="app">

  <!-- Toolbar -->
  <div id="toolbar">
    <button onclick="filePrompt()" data-i18n="btnFile" title="Open file (Ctrl+O)">📂 File</button>
    <button onclick="filePromptNew()" data-i18n="btnFileNew" title="Open in new window (Ctrl+Shift+O)">⧉ File</button>
    <button id="paste-btn" onclick="pasteText()" data-i18n="btnPaste" title="Paste (Ctrl+V)" class="glow">📋 Paste</button>
    <button onclick="selectAndCopy()" data-i18n="btnCopy" title="Select all &amp; copy (Ctrl+Enter)">📄 Copy All</button>
    <button id="copy-sel-btn" onclick="copySelection()" data-i18n="btnCopySel" title="Copy selection" disabled="">📋 Copy Sel</button>
    <button onclick="clearText()" data-i18n="btnClear" title="Clear (Esc)">🗑 Clear</button>
    <div class="tb-sep"></div>
    <button id="wrap-btn" onclick="toggleWrap()" data-i18n="btnWrap" title="Toggle word wrap">↵ Wrap</button>
    <button id="lines-btn" onclick="toggleLineNumbers()" data-i18n="btnLines" title="Toggle line numbers">¶ Lines</button>
    <div class="tb-sep"></div>
    <button onclick="toggleFind()" data-i18n="btnFind" title="Find (Ctrl+F)">🔎 Find</button>
    <button onclick="openReplace()" data-i18n="btnReplace" title="Find &amp; Replace (Ctrl+H)">⇄ Replace</button>
    <div class="tb-sep"></div>
    <input id="filename" class="fname-input" value="Untitled.txt" onfocus="selectFilename(this)" title="Filename for save">
    <button id="save-btn" onclick="triggerSave()" data-i18n="btnSave" title="Save (Ctrl+S)">💾 Save</button>
    <button onclick="triggerSaveAs()" data-i18n="btnSaveAs" title="Save As (Ctrl+Shift+S)">⬆ Save As</button>
    <div class="tb-sep"></div>
    <button id="protect-btn" onclick="toggleProtect()" data-i18n="btnProtect" title="Protect / lock from editing">🔓 Protect</button>
    <button id="syntax-btn" onclick="toggleSyntax()" data-i18n="btnSyntax" title="Syntax highlighting (enables Read Only)">✨ Syntax</button>
    <select id="syntax-lang-select" onchange="onSyntaxLangChange()" title="Syntax language">
      <option value="auto">Auto</option>
      <option value="js">JavaScript</option>
      <option value="ts">TypeScript</option>
      <option value="py">Python</option>
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="json">JSON</option>
      <option value="xml">XML</option>
      <option value="sql">SQL</option>
      <option value="sh">Shell</option>
      <option value="c">C/C++</option>
      <option value="java">Java</option>
      <option value="rb">Ruby</option>
      <option value="md">Markdown</option>
    </select>
    <div class="tb-sep"></div>
    <button onclick="toggleDark()" data-i18n="btnDark" title="Toggle dark mode">🌙 Dark</button>
    <button onclick="zoomOut()" title="Zoom out">−</button>
    <button onclick="zoomReset()" title="Reset zoom">↺</button>
    <button onclick="zoomIn()" title="Zoom in">+</button>
  </div>

  <!-- Find/Replace bar -->
  <div id="findbar">
    <label data-i18n="findLabel">Find:</label>
    <input id="find-input" data-i18n-ph="findPh" placeholder="Search…" oninput="onFindInput()" onkeydown="findBarKey(event)">
    <button onclick="findNext()" data-i18n="btnNext">▼ Next</button>
    <button onclick="findPrev()" data-i18n="btnPrev">▲ Prev</button>
    <span class="match-info" id="match-info"></span>
    <div id="replace-row">
      <label data-i18n="replaceLabel">Replace:</label>
      <input id="replace-input" data-i18n-ph="replacePh" placeholder="Replace with…" onkeydown="replaceBarKey(event)">
      <button onclick="doReplace()" data-i18n="btnReplaceOne">Replace</button>
      <button onclick="doReplaceAll()" data-i18n="btnReplaceAll">All</button>
    </div>
    <button class="close-btn" onclick="closeFindBar()" title="Close (Esc)">✕</button>
  </div>

  <!-- Clear confirm prompt (edition 4) -->
  <div id="clear-confirm">
    <span data-i18n="clearConfirmMsg">Unprotect and clear?</span>
    <button class="cc-do" onclick="forceUnprotectAndClear()" data-i18n="clearConfirmDo">Unprotect &amp; Clear (Esc)</button>
    <button class="cc-keep" onclick="dismissClearConfirm()" data-i18n="clearConfirmKeep">Keep</button>
  </div>

  <!-- Editor -->
  <div id="editor-wrap">
    <div id="linenums" style="display:none"></div>
    <pre id="hl-view"></pre>
    <textarea id="text" spellcheck="false" autofocus=""></textarea>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="sb-left">Ln 1/1, Col 1 │ 0 words │ 0 chars │ 100%</span>
    <span id="sb-msg"></span>
  </div>

</div><!-- #app -->

let T = LANGS.en;

function applyLang(code) {
  T = LANGS[code] || LANGS.en;
  document.documentElement.lang = code;
  document.body.classList.toggle("rtl", !!T.rtl);
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.getAttribute("data-i18n");
    if (T[k] !== undefined) el.innerHTML = T[k];
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    const k = el.getAttribute("data-i18n-ph");
    if (T[k] !== undefined) el.placeholder = T[k];
  });
  // Update dark button label
  const db = document.querySelector('[data-i18n="btnDark"]');
  if (db) db.innerHTML = document.body.classList.contains("dark") ? T.btnLight : T.btnDark;
  // Update protect button label
  updateProtectBtn();
  updateStatusBar();
  if (findbar.classList.contains("visible")) buildMatches();
  if (isElectron && window.electronAPI) window.electronAPI.langChanged(code);
}

const EXT_LANG = {
  js:"js",mjs:"js",cjs:"js",jsx:"js",
  ts:"ts",tsx:"ts",
  html:"html",htm:"html",
  css:"css",scss:"css",less:"css",
  py:"py",python:"py",
  json:"json",
  xml:"xml",svg:"xml",
  sh:"sh",bash:"sh",
  c:"c",cpp:"c",h:"c",hpp:"c",
  java:"java",
  rb:"rb",
  php:"php",
  sql:"sql",
  md:"md",markdown:"md",
};

function detectSyntaxLang(fname, content) {
  const ext = (fname.split(".").pop()||"").toLowerCase();
  if (EXT_LANG[ext]) return EXT_LANG[ext];
  if (/^\s*<(!DOCTYPE\s+html|html[\s>])/i.test(content)) return "html";
  if (/^\s*<\?xml/i.test(content)) return "xml";
  if (/^\s*[\[{]/.test(content) && /"[^"]+"\s*:/.test(content)) return "json";
  if (/\bdef |import |print\(|elif /.test(content)) return "py";
  if (/\b(function |const |let |var |=>)/.test(content)) return "js";
  if (/\bSELECT\b.*\bFROM\b/i.test(content)) return "sql";
  return "plain";
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function tokenize(code, rules) {
  if (!rules || !rules.length) return esc(code);
  const rx = new RegExp(rules.map(r=>"("+r.re.source+")").join("|"), "gms");
  let out = "", pos = 0, m;
  while ((m = rx.exec(code)) !== null) {
    if (m.index > pos) out += esc(code.slice(pos, m.index));
    for (let i = 0; i < rules.length; i++) {
      if (m[i+1] !== undefined) {
        out += `<span class="t-${rules[i].c}">${esc(m[i+1])}</span>`;
        break;
      }
    }
    pos = rx.lastIndex;
    if (pos === m.index) rx.lastIndex++;
  }
  if (pos < code.length) out += esc(code.slice(pos));
  return out;
}

const RULES = {
  js: [

function renderSyntax() {
  const lang = syntaxLang === "auto"
    ? detectSyntaxLang(document.getElementById("filename").value, textarea.value)
    : syntaxLang;
  const rules = RULES[lang] || [];
  hlView.innerHTML = tokenize(textarea.value, rules);
  hlView.scrollTop  = textarea.scrollTop;
  hlView.scrollLeft = textarea.scrollLeft;
}

function toggleSyntax() {
  syntaxOn = !syntaxOn;
  syntaxBtn.classList.toggle("active", syntaxOn);
  syntaxLangSel.classList.toggle("show", syntaxOn);

  if (syntaxOn) {
    // Auto-detect lang and set dropdown
    const detected = detectSyntaxLang(document.getElementById("filename").value, textarea.value);
    if (syntaxLang === "auto") syntaxLangSel.value = "auto";
    renderSyntax();
    hlView.classList.add("show");
    textarea.style.display = "none";
    // Syntax ON always activates Protect
    setProtected(true);
  } else {
    hlView.classList.remove("show");
    hlView.innerHTML = "";
    textarea.style.display = "";
    textarea.focus();
    // Protect stays ON — user must manually unlock
  }
  updateStatusBar();
}

function onSyntaxLangChange() {
  syntaxLang = syntaxLangSel.value;
  if (syntaxOn) renderSyntax();
}

// ═══════════════════════════════════════════════════════════════
// PROTECT
// ═══════════════════════════════════════════════════════════════
function pulseProtect() {
  protectBtn.classList.remove("pulse");
  // Force reflow to restart animation
  void protectBtn.offsetWidth;
  protectBtn.classList.add("pulse");
  protectBtn.addEventListener("animationend", () => protectBtn.classList.remove("pulse"), { once: true });
}

function setProtected(val) {
  isProtected = val;
  textarea.readOnly = val;
  wrapBtn.disabled  = val;
  escCount = 0;
  updateProtectBtn();
  updateStatusBar();
  updatePasteGlow();
}

function toggleProtect() {
  if (syntaxOn) {
    // Syntax is driving protect — turn off both together
    syntaxOn = false;
    syntaxBtn.classList.remove("active");
    syntaxLangSel.classList.remove("show");
    hlView.classList.remove("show");
    hlView.innerHTML = "";
    textarea.style.display = "";
    setProtected(false);
    textarea.focus();
  } else {
    setProtected(!isProtected);
  }
}

function updateProtectBtn() {
  if (isProtected) {
    protectBtn.classList.add("active");
    protectBtn.innerHTML = T.btnProtect.replace("🔓","🔒");
  } else {
    protectBtn.classList.remove("active");
    protectBtn.innerHTML = T.btnProtect;
  }
}

// ═══════════════════════════════════════════════════════════════
// FIND & REPLACE (fixed off-by-one)
// ═══════════════════════════════════════════════════════════════
// Edition 2: Find button toggles the bar open/closed
function toggleFind() {
  if (findbar.classList.contains("visible")) { closeFindBar(); return; }
  openFind();
}
function openFind() {
  findbar.classList.add("visible");
  replaceRow.classList.remove("visible");
  // Edition 5: pre-fill with current selection
  const sel = textarea.value.substring(textarea.selectionStart, textarea.selectionEnd).trim();
  if (sel) findInputEl.value = sel;
  findInputEl.focus(); findInputEl.select();
  if (findInputEl.value) { buildMatches(); if (allMatches.length) { matchCursor = 0; jumpToMatch(allMatches[0]); } }
}
function openReplace() {
  findbar.classList.add("visible");
  replaceRow.classList.add("visible");
  const sel = textarea.value.substring(textarea.selectionStart, textarea.selectionEnd).trim();
  if (sel) findInputEl.value = sel;
  findInputEl.focus(); findInputEl.select();
  if (findInputEl.value) { buildMatches(); if (allMatches.length) { matchCursor = 0; jumpToMatch(allMatches[0]); } }
}
function closeFindBar() {
  findbar.classList.remove("visible");
  allMatches = []; matchCursor = -1; matchInfoEl.textContent = "";
  textarea.focus();
}
// Edition 6: typing in find box immediately jumps to first match
function onFindInput() {
  matchCursor = -1;
  buildMatches();
  if (allMatches.length) { matchCursor = 0; jumpToMatch(allMatches[0]); }
}

function buildMatches() {
  const q = findInputEl.value;
  allMatches = []; matchInfoEl.textContent = "";
  if (!q) return;

  // FIX: use the raw textarea.value directly, case-insensitive via toUpperCase
  // toUpperCase avoids locale-specific toLowerCase issues (e.g. Turkish İ)
  const text  = textarea.value;
  const textU = text.toUpperCase();
  const qU    = q.toUpperCase();
  const qLen  = q.length;

  let start = 0;
  while (start <= text.length - qLen) {
    const idx = textU.indexOf(qU, start);
    if (idx === -1) break;
    allMatches.push(idx);  // store exact start index from original string
    start = idx + 1;
  }

  if (allMatches.length) {
    const word = allMatches.length === 1 ? T.match : T.matches;
    matchInfoEl.textContent = `${allMatches.length} ${word}`;
  } else {
    matchInfoEl.textContent = T.noMatch;
  }
}

function findNext() {
  if (!allMatches.length) { buildMatches(); if (!allMatches.length) return; }
  matchCursor = (matchCursor + 1) % allMatches.length;
  jumpToMatch(allMatches[matchCursor]);
}
function findPrev() {
  if (!allMatches.length) { buildMatches(); if (!allMatches.length) return; }
  matchCursor = (matchCursor - 1 + allMatches.length) % allMatches.length;
  jumpToMatch(allMatches[matchCursor]);
}

function jumpToMatch(idx) {
  const q = findInputEl.value;
  // Select exactly from idx to idx + q.length in the original string
  textarea.focus();
  textarea.setSelectionRange(idx, idx + q.length);
  // Scroll to show the match
  const before  = textarea.value.substring(0, idx);
  const lineNum = (before.match(/\n/g) || []).length;
  const lineH   = parseFloat(getComputedStyle(textarea).lineHeight) || 22.4;
  textarea.scrollTop = Math.max(0, lineNum * lineH - textarea.clientHeight / 2 + lineH);
  // Update match counter
  matchInfoEl.textContent = `${matchCursor + 1} / ${allMatches.length} ${allMatches.length === 1 ? T.match : T.matches}`;
}

function doReplace() {
  if (!allMatches.length || matchCursor < 0) { findNext(); return; }
  const q = findInputEl.value;
  const r = replaceInputEl.value;
  const idx = allMatches[matchCursor];
  textarea.value = textarea.value.substring(0, idx) + r + textarea.value.substring(idx + q.length);
  buildMatches();
  matchCursor = Math.min(matchCursor, allMatches.length - 1);
  updateCount(); updateLineNumbers();
  if (allMatches.length) jumpToMatch(allMatches[matchCursor]);
  else showMsg(T.replaced);
}

function doReplaceAll() {
  const q = findInputEl.value; if (!q) return;
  const r = replaceInputEl.value;
  const textU = textarea.value.toUpperCase();
  const qU = q.toUpperCase();
  let result = "", pos = 0;
  while (true) {
    const idx = textU.indexOf(qU, pos);
    if (idx === -1) { result += textarea.value.substring(pos); break; }
    result += textarea.value.substring(pos, idx) + r;
    pos = idx + q.length;
  }
  textarea.value = result;
  buildMatches(); updateCount(); updateLineNumbers();
  showMsg(T.allReplaced);
}

function findBarKey(e) {
  if (e.key === "Enter") { e.shiftKey ? findPrev() : findNext(); e.preventDefault(); }
  if (e.key === "Escape") closeFindBar();
}
function replaceBarKey(e) {
  if (e.key === "Enter") { doReplace(); e.preventDefault(); }
  if (e.key === "Escape") closeFindBar();
}

// ═══════════════════════════════════════════════════════════════
// STATUS BAR (Edition 8 — full format)
// ═══════════════════════════════════════════════════════════════
function updateStatusBar() {
  const val  = textarea.value;
  const sel  = textarea.selectionEnd - textarea.selectionStart;
  const before = val.substring(0, textarea.selectionStart);
  const lines  = before.split("\n");
  const ln     = lines.length;
  const col    = lines[lines.length - 1].length + 1;
  const totalLn = (val.match(/\n/g) || []).length + 1;
  const totalW  = val.trim() ? val.trim().split(/\s+/).length : 0;
  const totalC  = val.length;
  const zoom    = Math.round(fontSize / 14 * 100) + "%";

  const parts = [`Ln ${ln}/${totalLn}, Col ${col}`];

  // Selection info (only when something is selected)
  if (sel > 0) {
    const selText  = val.substring(textarea.selectionStart, textarea.selectionEnd);
    const selWords = selText.trim() ? selText.trim().split(/\s+/).length : 0;
    parts.push(`${selWords} ${T.words}, ${sel} ${T.chars} ${T.selected}`);
  }

  parts.push(`${totalW} ${T.words}`);
  parts.push(`${totalC} ${T.chars}`);
  parts.push(zoom);

  // Mode indicators
  if (syntaxOn)         parts.push(T.readOnly);
  else if (isProtected) parts.push(T.protectedLabel);

  sbLeft.textContent = parts.join(" │ ");
}

function showMsg(msg) {
  clearTimeout(msgTimer);
  sbMsg.textContent = msg;
  sbMsg.classList.add("show");
  msgTimer = setTimeout(() => { sbMsg.classList.remove("show"); }, 2200);
}

// ═══════════════════════════════════════════════════════════════
// LINE NUMBERS
// ═══════════════════════════════════════════════════════════════
function updateLineNumbers() {
  if (!showLines) return;
  const n = textarea.value.split("\n").length;
  linenums.textContent = Array.from({length: n}, (_, i) => i + 1).join("\n");
  linenums.scrollTop = textarea.scrollTop;
}
function toggleLineNumbers() {
  if (isProtected && !showLines) { pulseProtect(); showMsg(T.protectFirst); return; }
  // Edition 1: enabling Lines disables Wrap
  if (!showLines && wrap) {
    wrap = false;
    wrapBtn.classList.remove("active");
    textarea.classList.remove("wrap-mode");
    hlView.classList.remove("wrap-mode");
  }
  showLines = !showLines;
  linesBtn.classList.toggle("active", showLines);
  linenums.style.display = showLines ? "block" : "none";
  if (showLines) updateLineNumbers();
}
textarea.addEventListener("scroll", () => {
  if (showLines)  linenums.scrollTop  = textarea.scrollTop;
  if (syntaxOn)   { hlView.scrollTop  = textarea.scrollTop; hlView.scrollLeft = textarea.scrollLeft; }
});

// ═══════════════════════════════════════════════════════════════
// WRAP
// ═══════════════════════════════════════════════════════════════
function toggleWrap() {
  if (isProtected) return;
  wrap = !wrap;
  wrapBtn.classList.toggle("active", wrap);
  textarea.classList.toggle("wrap-mode", wrap);
  hlView.classList.toggle("wrap-mode", wrap);
  if (wrap && showLines) {
    showLines = false; linesBtn.classList.remove("active");
    linenums.style.display = "none"; showMsg(T.linesHidden);
  }
}

// ═══════════════════════════════════════════════════════════════
// COPY / PASTE
// ═══════════════════════════════════════════════════════════════
function selectAndCopy() {
  const content = textarea.value;
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(content).then(() => showMsg(T.copied)).catch(() => fallbackCopy());
  else fallbackCopy();
}
function fallbackCopy() {
  const wasHidden = textarea.style.display === "none";
  if (wasHidden) textarea.style.display = "";
  textarea.select();
  try { document.execCommand("copy"); showMsg(T.copied); }
  catch(e) { showMsg(T.copyFailed); }
  if (wasHidden) textarea.style.display = "none";
}

// Edition 7: copy only the selected text
function copySelection() {
  const sel = textarea.value.substring(textarea.selectionStart, textarea.selectionEnd);
  if (!sel) return;
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(sel).then(() => showMsg(T.copied)).catch(() => {
      try { document.execCommand("copy"); showMsg(T.copied); } catch(e) { showMsg(T.copyFailed); }
    });
  else {
    try { document.execCommand("copy"); showMsg(T.copied); } catch(e) { showMsg(T.copyFailed); }
  }
}

// Update copy-sel button enabled state
function updateCopySelBtn() {
  const hasSel = textarea.selectionStart !== textarea.selectionEnd;
  copySelBtn.disabled = !hasSel;
}

// Edition 8: paste glow when textarea is empty
function updatePasteGlow() {
  const empty = textarea.value.length === 0;
  pasteBtn.classList.toggle("glow", empty && !isProtected);
}

function pasteText() {
  // Edition 3: if protected AND textarea is empty, allow one paste then re-lock
  if (isProtected && textarea.value.length === 0) {
    const doInsert = (t) => {
      textarea.readOnly = false;
      const s = textarea.selectionStart;
      textarea.value = t;
      textarea.selectionStart = textarea.selectionEnd = t.length;
      textarea.readOnly = true;
      updateCount(); updateLineNumbers();
      if (syntaxOn) renderSyntax();
      updatePasteGlow();
    };
    if (navigator.clipboard && navigator.clipboard.readText)
      navigator.clipboard.readText().then(doInsert).catch(() => showMsg(T.longPress));
    else showMsg(T.longPress);
    return;
  }
  if (isProtected) { pulseProtect(); showMsg(T.protectFirst); return; }
  if (navigator.clipboard && navigator.clipboard.readText)
    navigator.clipboard.readText().then(insertAtCursor).catch(() => showMsg(T.longPress));
  else { textarea.focus(); if (!document.execCommand("paste")) showMsg(T.longPress); }
}
function insertAtCursor(t) {
  if (isProtected) return;
  const s = textarea.selectionStart;
  textarea.value = textarea.value.substring(0,s) + t + textarea.value.substring(textarea.selectionEnd);
  textarea.selectionStart = textarea.selectionEnd = s + t.length;
  updateCount(); updateLineNumbers();
  if (syntaxOn) renderSyntax();
  updatePasteGlow();
}

// ═══════════════════════════════════════════════════════════════
// WORD / CHAR COUNT
// ═══════════════════════════════════════════════════════════════
function updateCount() {
  updateStatusBar();
  updatePasteGlow();
}

// ═══════════════════════════════════════════════════════════════
// FILE OPERATIONS
// ═══════════════════════════════════════════════════════════════
// Binary detection: too many replacement chars = likely binary
function isBinary(content) {
  return (content.match(/\uFFFD/g) || []).length > 8 ||
         (content.match(/\x00/g)   || []).length > 8;
}

function loadContent(content, fname) {
  // Strip BOM
  if (content.charCodeAt(0) === 0xFEFF) content = content.slice(1);
  textarea.value = content;
  if (fname) document.getElementById("filename").value = fname;
  updateCount(); updateLineNumbers();
  if (syntaxOn) renderSyntax();
  if (isBinary(content)) showMsg(T.binary);
  textarea.focus();
}

function filePrompt() {
  if (isElectron) { window.electronAPI.triggerOpen(); return; }
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "*/*";   // Web: accept ALL file types
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    document.getElementById("filename").value = file.name;
    const reader = new FileReader();
    reader.onload = ev => loadContent(ev.target.result, file.name);
    reader.readAsText(file, "utf-8");
  };
  inp.click();
}

function filePromptNew() {
  if (isElectron) { window.electronAPI.triggerOpenNew(); return; }
  window.open(location.href, "_blank");
}

function triggerSave() {
  if (isElectron) { window.electronAPI.triggerSave(); return; }
  downloadFile();
}
function triggerSaveAs() {
  if (isElectron) { window.electronAPI.triggerSaveAs(); return; }
  downloadFile();
}
function downloadFile() {
  const blob = new Blob([textarea.value], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = document.getElementById("filename").value || "Untitled.txt";
  a.click();
  showMsg(T.saved);
}

function toggleDark() {

  const btn = document.querySelector('[data-i18n="btnDark"]');
  if (btn) btn.innerHTML = dark ? T.btnLight : T.btnDark;

function clearText() {
  if (isProtected) {
    // Edition 4: show inline confirm prompt instead of blocking
    clearConfirmBar.classList.add("show");
    return;
  }
  _doClear();
}
function _doClear() {
  clearConfirmBar.classList.remove("show");
  textarea.value = "";
  document.getElementById("filename").value = "Untitled.txt";
  saveBtn.classList.remove("has-file");
  closeFindBar();
  if (syntaxOn) { syntaxOn = false; syntaxBtn.classList.remove("active"); syntaxLangSel.classList.remove("show"); hlView.classList.remove("show"); hlView.innerHTML = ""; textarea.style.display = ""; }
  updateCount(); updateLineNumbers();
  if (isElectron) window.electronAPI.fileCleared();
  updatePasteGlow();
  textarea.focus();
}
function forceUnprotectAndClear() {
  setProtected(false);
  if (syntaxOn) { syntaxOn = false; syntaxBtn.classList.remove("active"); syntaxLangSel.classList.remove("show"); hlView.classList.remove("show"); hlView.innerHTML = ""; textarea.style.display = ""; }
  _doClear();
}
function dismissClearConfirm() {
  clearConfirmBar.classList.remove("show");
  escCount = 0;
  textarea.focus();
}

function setZoom(n) {
  fontSize = n;
  [textarea, linenums, hlView].forEach(el => el.style.fontSize = fontSize + "px");
  updateStatusBar();
}
function zoomIn()    { setZoom(Math.min(40, fontSize + 1)); }
function zoomOut()   { setZoom(Math.max(6,  fontSize - 1)); }
function zoomReset() { setZoom(14); }

function selectFilename(el) {
  const dot = el.value.lastIndexOf(".");
  setTimeout(() => el.setSelectionRange(0, dot > 0 ? dot : el.value.length), 0);
}

// ═══════════════════════════════════════════════════════════════
// ELECTRON BRIDGE
// ═══════════════════════════════════════════════════════════════
if (isElectron) {
  document.body.classList.add("is-electron");

  window.electronAPI.onFileOpened(({content, name}) => {
    loadContent(content, name);
    saveBtn.classList.add("has-file");
  });
  window.electronAPI.onRequestContentForSave(({mode}) => {
    window.electronAPI.saveContent({
      content: textarea.value,
      mode,
      suggestedName: document.getElementById("filename").value || "Untitled.txt",
    });
  });
  window.electronAPI.onSaveSuccess(({filePath}) => {
    const name = filePath.split(/[\\/]/).pop();
    document.getElementById("filename").value = name;
    saveBtn.classList.add("has-file");
    showMsg(T.saved);
  });
  window.electronAPI.onApplyLang(code => {
    const sel = document.getElementById("ui-lang");
    if (sel) sel.value = code;
    applyLang(code);
  });
}

// ═══════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════
textarea.addEventListener("input", () => {
  updateCount(); updateLineNumbers();
  if (syntaxOn) renderSyntax();
  if (findbar.classList.contains("visible")) buildMatches();
});
textarea.addEventListener("click",   () => { updateStatusBar(); updateCopySelBtn(); });
textarea.addEventListener("keyup",   () => { updateStatusBar(); updateCopySelBtn(); });
textarea.addEventListener("select",  () => { updateStatusBar(); updateCopySelBtn(); });
textarea.addEventListener("selectionchange", () => { updateStatusBar(); updateCopySelBtn(); });

textarea.addEventListener("keydown", e => {
  if (e.key === "Tab") {
    e.preventDefault();
    if (isProtected) { pulseProtect(); showMsg(T.protectFirst); return; }
    const s = textarea.selectionStart;
    textarea.value = textarea.value.substring(0,s) + "  " + textarea.value.substring(textarea.selectionEnd);
    textarea.selectionStart = textarea.selectionEnd = s + 2;
    updateLineNumbers();
    if (syntaxOn) renderSyntax();
    return;
  }
  // Pulse protect on any printable key attempt while protected
  if (isProtected && !e.ctrlKey && !e.metaKey && !e.altKey && e.key.length === 1) {
    pulseProtect(); showMsg(T.protectFirst);
  }
});

document.addEventListener("keydown", e => {
  if (e.target === findInputEl || e.target === replaceInputEl) return;
  const ctrl = e.ctrlKey || e.metaKey;

  // Edition 4: triple-ESC unlock sequence
  if (e.key === "Escape") {
    e.preventDefault();
    if (clearConfirmBar.classList.contains("show")) { dismissClearConfirm(); return; }
    if (findbar.classList.contains("visible")) { closeFindBar(); escCount = 0; return; }
    if (isProtected) {
      escCount++;
      clearTimeout(escTimer);
      escTimer = setTimeout(() => { escCount = 0; }, 4000);
      if (escCount === 1) showMsg(T.escUnlock3);
      else if (escCount === 2) showMsg(T.escUnlock2);
      else if (escCount >= 3) { showMsg(T.escUnlock1); forceUnprotectAndClear(); escCount = 0; }
      return;
    }
    escCount = 0;
    clearText();
    return;
  }

  if (ctrl && e.key === "Enter")                          { e.preventDefault(); selectAndCopy(); }
  if (ctrl && e.key === "f")                              { e.preventDefault(); toggleFind(); }
  if (ctrl && e.key.toLowerCase() === "h")               { e.preventDefault(); openReplace(); }
  if (ctrl && e.key.toLowerCase() === "o" && !e.shiftKey){ e.preventDefault(); filePrompt(); }
  if (ctrl && e.key.toLowerCase() === "o" && e.shiftKey) { e.preventDefault(); filePromptNew(); }
  if (ctrl && e.shiftKey && e.key.toLowerCase() === "s") { e.preventDefault(); triggerSaveAs(); }
  if (ctrl && !e.shiftKey && e.key.toLowerCase() === "s"){ e.preventDefault(); triggerSave(); }
  if (ctrl && e.key.toLowerCase() === "n") { e.preventDefault(); if (isElectron) window.electronAPI.triggerNewWin(); }
  // Edition 10: Ctrl+W closes current window (Electron only)
  if (ctrl && e.key.toLowerCase() === "w") { e.preventDefault(); if (isElectron) window.electronAPI.closeWin(); }
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
updateStatusBar();
updatePasteGlow();
updateCopySelBtn();

// Ensure textarea is focused on every new window/tab load (edition 1)
window.addEventListener("load", () => textarea.focus());

// Auto-detect browser language
(function() {
  const bl = (navigator.language || "en").toLowerCase();
  const MAP = {
    en:"en","en-us":"en","en-gb":"en",
    es:"es","es-es":"es","es-mx":"es",
    zh:"zh","zh-cn":"zh","zh-tw":"zh","zh-hk":"zh",
    ja:"ja", it:"it", ar:"ar","ar-sa":"ar",
    de:"de", nl:"nl", hi:"hi",
    fr:"fr","fr-fr":"fr",
    pt:"pt","pt-br":"pt","pt-pt":"pt",
    ru:"ru", tr:"tr", ko:"ko", he:"he", ga:"ga",
  };
  const d = MAP[bl] || MAP[bl.split("-")[0]];
  if (d && d !== "en") {
    const sel = document.getElementById("ui-lang");
    if (sel) sel.value = d;
    applyLang(d);
  }
})();
</script>
