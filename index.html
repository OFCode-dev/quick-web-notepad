<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quick Web Notepad</title>
<meta name="description" content="A fast, secure, and distraction-free online plain text editor. Works completely offline, supports multiple languages, and saves directly to your device. No login required." />
<meta name="keywords" content="online notepad, plain text editor, quick notes, web notepad, text editor online, dark mode notepad, ofcode" />
<meta name="author" content="OFCode" />
<meta property="og:title" content="Quick Web Notepad - Free Online Text Editor" />
<meta property="og:description" content="Fast, distraction-free plain text editor directly in your browser." />

<style>
  :root {
    --bg:        #f0ece4;
    --surface:   #fffdf9;
    --border:    #2a2a2a;
    --accent:    #d4560a;
    --accent2:   #f5a623;
    --text:      #1a1a1a;
    --muted:     #888;
    --header-bg: #2a2a2a;
    --toolbar:   #fafafa;
    --footer-bg: #e8e4dc;
    --hint-bg:   #fdf6ec;
    --lnum-bg:   #f4f0e8;
    --lnum-col:  #aaa;
    --findbar:   #fff8f0;
    --shadow:    0 4px 24px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.08);
  }
  .dark {
    --bg:        #141414;
    --surface:   #1c1c1c;
    --border:    #444;
    --text:      #e0d8cc;
    --muted:     #666;
    --header-bg: #111;
    --toolbar:   #2a2a2a;
    --footer-bg: #181818;
    --hint-bg:   #1e1e1e;
    --lnum-bg:   #191919;
    --lnum-col:  #555;
    --findbar:   #222;
    --shadow:    0 4px 24px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', Consolas, monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  /* ── PAGE HEADER ── */
  #page-header {
    background: var(--header-bg);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 3px solid var(--accent);
  }
  .monitor-icon svg { width: 36px; height: 36px; display: block; }
  #page-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 20px; color: #fff;
    letter-spacing: 0.05em; text-transform: uppercase; line-height: 1;
  }
  #page-header h1 em { color: var(--accent2); font-style: normal; }
  #page-header .tagline {
    font-size: 10px; color: #555;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* language selector in header */
  #langWrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #page-header .tagline { margin-left: 0; }
  #uiLang {
    font-size: 12px;
    background: #3a3a3a;
    color: #ddd;
    border: 1px solid #666;
    border-radius: 3px;
    padding: 3px 6px;
    cursor: pointer;
  }
  #uiLang:focus { outline: 1px solid var(--accent2); }

  /* ── WRAPPER ── */
  #wrapper { max-width: 1100px; margin: 24px auto; padding: 0 16px 40px; }

  /* ── APP CARD ── */
  #app {
    border: 2px solid var(--border); border-radius: 4px;
    overflow: hidden; box-shadow: var(--shadow); background: var(--surface);
  }

  /* ── HINT BAR ── */
  #hint {
    padding: 5px 12px; font-size: 11px;
    background: var(--hint-bg); border-bottom: 1px solid #ddd; color: var(--muted);
  }
  .dark #hint { border-bottom-color: #333; }
  #hint strong { color: var(--accent); font-weight: 600; margin-right: 4px; }
  @media (hover: none), (max-width: 600px) { #hint { display: none; } }

  /* ── TOOLBAR ── */
  .controls {
    padding: 6px 8px; display: flex; flex-wrap: wrap; gap: 3px;
    align-items: center; background: var(--toolbar); border-bottom: 1px solid var(--border);
  }
  .controls button {
    padding: 3px 8px; font-size: 12px; cursor: pointer;
    background: buttonface; color: buttontext;
    border: 1px solid #aaa; border-radius: 2px; white-space: nowrap;
  }
  .dark .controls button { background: #3a3a3a; color: #ddd; border-color: #555; }
  .controls button:hover { filter: brightness(0.93); }
  .controls button.active { background: #cce5ff; border-color: #66b2ff; color: #003; }
  .dark .controls button.active { background: #1a3a5c; border-color: #4499dd; color: #aad4ff; }

  .controls input {
    padding: 3px 7px; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid #aaa; border-radius: 2px;
    width: 130px; background: var(--surface); color: var(--text);
  }
  .dark .controls input { border-color: #555; }
  .controls input:focus { outline: 1px solid var(--accent); }

  .sep { width: 1px; height: 18px; background: #ccc; margin: 0 2px; flex-shrink: 0; }
  .dark .sep { background: #555; }
  #status { font-size: 11px; color: var(--accent); margin-left: 4px; min-width: 80px; }

  /* ── FIND / REPLACE BAR ── */
  #findbar {
    display: none; padding: 6px 10px; gap: 6px;
    align-items: center; flex-wrap: wrap;
    background: var(--findbar); border-bottom: 1px solid var(--border); font-size: 12px;
  }
  #findbar.visible { display: flex; }
  #findbar label { color: var(--muted); font-size: 11px; white-space: nowrap; }
  #findbar input {
    padding: 3px 7px; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid #aaa; border-radius: 2px;
    width: 160px; background: var(--surface); color: var(--text);
  }
  .dark #findbar input { border-color: #555; }
  #findbar input:focus { outline: 1px solid var(--accent); }
  #findbar button {
    padding: 3px 8px; font-size: 12px; cursor: pointer;
    border: 1px solid #aaa; border-radius: 2px;
    background: buttonface; color: buttontext; white-space: nowrap;
  }
  .dark #findbar button { background: #3a3a3a; color: #ddd; border-color: #555; }
  #findbar button:hover { filter: brightness(0.93); }
  #findbar .close-btn { margin-left: auto; font-size: 14px; line-height: 1; padding: 2px 7px; }
  #findbar .match-info { font-size: 11px; color: var(--muted); }
  #replaceRow { display: none; align-items: center; gap: 6px; flex-wrap: wrap; }
  #replaceRow.visible { display: flex; }

  /* ── EDITOR ── */
  #container { display: flex; height: 62vh; background: var(--surface); overflow: hidden; }
  #linenumbers {
    user-select: none; background: var(--lnum-bg); color: var(--lnum-col);
    padding: 10px 8px 10px 10px; text-align: right; border-right: 1px solid #ccc;
    font-size: 14px; line-height: 1.6em; overflow: hidden; white-space: pre;
    min-width: 3.2em; flex-shrink: 0; font-family: 'JetBrains Mono', monospace;
  }
  .dark #linenumbers { border-right-color: #333; }
  #text {
    border: none; resize: none; outline: none;
    padding: 10px 14px; width: 100%;
    font-size: 14px; font-family: 'JetBrains Mono', Consolas, monospace;
    line-height: 1.6em; white-space: pre;
    overflow-y: scroll; overflow-x: auto;
    background: var(--surface); color: var(--text);
    caret-color: var(--accent); tab-size: 2; -moz-tab-size: 2;
  }
  #text.wrap { white-space: pre-wrap; word-break: break-word; overflow-x: hidden; }

  /* ── FOOTER ── */
  #footer {
    padding: 4px 12px; font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    display: flex; justify-content: space-between; align-items: center;
    background: var(--footer-bg); color: var(--muted); border-top: 1px solid var(--border);
  }
  #footer b { color: var(--accent); }

  /* RTL support for Arabic */
  body.rtl #page-header { flex-direction: row-reverse; }
  body.rtl #langWrap { margin-left: 0; margin-right: auto; }
  body.rtl .controls { flex-direction: row-reverse; }
  body.rtl #findbar { flex-direction: row-reverse; }
  body.rtl #findbar .close-btn { margin-left: 0; margin-right: auto; }
  body.rtl #text { direction: rtl; text-align: right; }
  body.rtl #footer { flex-direction: row-reverse; }
</style>

      <option value="ja">🇯🇵 日本語</option>
      <option value="ko">🇰🇷 한국어</option>
      <option value="tr">🇹🇷 Türkçe</option>
      <option value="it">🇮🇹 Italiano</option>
      <option value="nl">🇳🇱 Nederlands</option>
      <option value="he">🇮🇱 עברית</option>
      <option value="ga">🇮🇪 Gaeilge</option>
    </select>
  </div>
</div>

<div id="wrapper">
  <div id="app">

    <div id="hint">
      <strong data-i18n="shortcutsLabel">Keyboard Shortcuts:</strong>
      <span data-i18n="shortcutsText">Ctrl+Enter: Select All &amp; Copy | Esc: Clear | Ctrl+F: Find | Ctrl+H: Find &amp; Replace | Ctrl+O: Open File</span>
    </div>

    <div class="controls">
      <button onclick="filePrompt()"    data-i18n="btnFile">📂 File</button>
      <button onclick="pasteText()"     data-i18n="btnPaste">📋 Paste</button>
      <button onclick="selectAndCopy()" data-i18n="btnCopy">📄 Select+Copy</button>
      <button onclick="clearText()"     data-i18n="btnClear">🧹 Clear</button>
      <div class="sep"></div>
      <button id="wrapBtn"  onclick="toggleWrap()"        data-i18n="btnWrap">📏 Wrap</button>
      <button id="linesBtn" onclick="toggleLineNumbers()" data-i18n="btnLines">🔢 Lines</button>
      <div class="sep"></div>
      <button onclick="openFind()"    data-i18n="btnFind">🔎 Find</button>
      <button onclick="openReplace()" data-i18n="btnReplace">🔁 Replace</button>
      <div class="sep"></div>
      <input id="filename" value="Untitled.txt" onfocus="selectFilename(this)" title="Filename" />
      <button onclick="saveFile()" data-i18n="btnDownload">💾 Download</button>
      <div class="sep"></div>
      <button onclick="toggleDark()" data-i18n="btnDark">🌙 Dark</button>
      <button onclick="zoomOut()">➖</button>
      <button onclick="zoomReset()">🔄</button>
      <button onclick="zoomIn()">➕</button>
      <span id="status"></span>
    </div>

    <div id="findbar">
      <label data-i18n="findLabel">Find:</label>
      <input id="findInput" data-i18n-ph="findPh" placeholder="Search…" oninput="onFindInput()" onkeydown="findBarKey(event)" />
      <button onclick="findNext()" data-i18n="btnNext">▼ Next</button>
      <button onclick="findPrev()" data-i18n="btnPrev">▲ Prev</button>
      <span class="match-info" id="matchInfo"></span>
      <div id="replaceRow">
        <label data-i18n="replaceLabel">Replace:</label>
        <input id="replaceInput" data-i18n-ph="replacePh" placeholder="Replace with…" onkeydown="replaceBarKey(event)" />
        <button onclick="doReplace()"    data-i18n="btnReplaceOne">Replace</button>
        <button onclick="doReplaceAll()" data-i18n="btnReplaceAll">All</button>
      </div>
      <button class="close-btn" onclick="closeFindBar()" title="Esc">✕</button>
    </div>

    <div id="container">
      <div id="linenumbers" style="display:none"></div>
      <textarea id="text" autofocus spellcheck="false"></textarea>
    </div>

    <div id="footer">
      <span><span data-i18n="words">Words</span>: <b id="wordCount">0</b> &nbsp;|&nbsp; <span data-i18n="chars">Chars</span>: <b id="charCount">0</b></span>
      <span id="cursorPos">Ln 1, Col 1</span>
    </div>

  </div>
</div>

let currentLang = "en";
let T = LANGS.en; // active translation shortcut

function applyLang(code) {
  currentLang = code;
  T = LANGS[code] || LANGS.en;
  document.documentElement.lang = code;

  // RTL toggle
  document.body.classList.toggle("rtl", !!T.rtl);

  // Update all data-i18n elements
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (T[key] !== undefined) el.innerHTML = T[key];
  });
  // Update placeholders
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    const key = el.getAttribute("data-i18n-ph");
    if (T[key] !== undefined) el.placeholder = T[key];
  });

  // Refresh dark button label to match current state
  const darkBtn = document.querySelector('[data-i18n="btnDark"]');
  if (darkBtn) darkBtn.innerHTML = document.body.classList.contains("dark") ? T.btnLight : T.btnDark;

  // Refresh match info if find bar is open
  if (findbar.classList.contains("visible")) highlightMatches();
}

// ─── ELEMENTS ─────────────────────────────────────────────────────────────────
const textarea    = document.getElementById("text");
const wrapBtn     = document.getElementById("wrapBtn");
const linesBtn    = document.getElementById("linesBtn");
const linenums    = document.getElementById("linenumbers");
const findbar     = document.getElementById("findbar");
const findInput   = document.getElementById("findInput");
const replaceInput= document.getElementById("replaceInput");
const replaceRow  = document.getElementById("replaceRow");
const matchInfo   = document.getElementById("matchInfo");

let wrap       = false;
let showLines  = false;
let fontSize   = 14;
let allMatches = [];
let matchCursor= -1;

// ─── LINE NUMBERS ─────────────────────────────────────────────────────────────
function updateLineNumbers() {
  if (!showLines) return;
  const count = textarea.value.split("\n").length;
  linenums.textContent = Array.from({ length: count }, (_, i) => i + 1).join("\n");
  linenums.scrollTop = textarea.scrollTop;
}
function toggleLineNumbers() {
  if (wrap) { status(T.disableWrapFirst); return; }
  showLines = !showLines;
  linesBtn.classList.toggle("active", showLines);
  linenums.style.display = showLines ? "block" : "none";
  if (showLines) updateLineNumbers();
}
textarea.addEventListener("scroll", () => {
  if (showLines) linenums.scrollTop = textarea.scrollTop;
});

// ─── WRAP ──────────────────────────────────────────────────────────────────────
function toggleWrap() {
  wrap = !wrap;
  wrapBtn.classList.toggle("active", wrap);
  textarea.classList.toggle("wrap", wrap);
  if (wrap && showLines) {
    showLines = false;
    linesBtn.classList.remove("active");
    linenums.style.display = "none";
    status(T.linesHidden);
  }
}

// ─── FIND / REPLACE ───────────────────────────────────────────────────────────
function openFind() {
  findbar.classList.add("visible");
  replaceRow.classList.remove("visible");
  findInput.focus(); findInput.select();
  if (findInput.value) highlightMatches();
}
function openReplace() {
  findbar.classList.add("visible");
  replaceRow.classList.add("visible");
  findInput.focus(); findInput.select();
  if (findInput.value) highlightMatches();
}
function closeFindBar() {
  findbar.classList.remove("visible");
  allMatches = []; matchCursor = -1; matchInfo.textContent = "";
  textarea.focus();
}
function onFindInput() { matchCursor = -1; highlightMatches(); }

function highlightMatches() {
  const q = findInput.value;
  allMatches = []; matchInfo.textContent = "";
  if (!q) return;
  const lower = textarea.value.toLowerCase();
  const ql = q.toLowerCase();
  let i = 0;
  while (true) {
    const idx = lower.indexOf(ql, i);
    if (idx === -1) break;
    allMatches.push(idx);
    i = idx + 1;
  }
  if (allMatches.length) {
    const word = allMatches.length === 1 ? T.match : T.matches;
    matchInfo.textContent = `${allMatches.length} ${word}`;
  } else {
    matchInfo.textContent = T.noMatch;
  }
}
function findNext() {
  if (!allMatches.length) { highlightMatches(); if (!allMatches.length) return; }
  matchCursor = (matchCursor + 1) % allMatches.length;
  jumpToMatch();
}
function findPrev() {
  if (!allMatches.length) { highlightMatches(); if (!allMatches.length) return; }
  matchCursor = (matchCursor - 1 + allMatches.length) % allMatches.length;
  jumpToMatch();
}
function jumpToMatch() {
  const idx = allMatches[matchCursor];
  const len = findInput.value.length;
  textarea.focus();
  textarea.setSelectionRange(idx, idx + len);
  const linesBefore = textarea.value.substring(0, idx).split("\n").length - 1;
  const lineH = parseFloat(getComputedStyle(textarea).lineHeight) || 22;
  textarea.scrollTop = Math.max(0, linesBefore * lineH - textarea.clientHeight / 2);
  const word = allMatches.length === 1 ? T.match : T.matches;
  matchInfo.textContent = `${matchCursor + 1} / ${allMatches.length} ${word}`;
}
function doReplace() {
  if (!allMatches.length || matchCursor < 0) { findNext(); return; }
  const q = findInput.value, r = replaceInput.value;
  const idx = allMatches[matchCursor];
  textarea.value = textarea.value.substring(0, idx) + r + textarea.value.substring(idx + q.length);
  highlightMatches();
  matchCursor = Math.min(matchCursor, allMatches.length - 1);
  updateCount(); updateLineNumbers();
  if (allMatches.length) jumpToMatch();
  else status(T.replaced);
}
function doReplaceAll() {
  const q = findInput.value; if (!q) return;
  const r = replaceInput.value;
  const lower = textarea.value.toLowerCase(), ql = q.toLowerCase();
  let result = "", i = 0;
  while (true) {
    const idx = lower.indexOf(ql, i);
    if (idx === -1) { result += textarea.value.substring(i); break; }
    result += textarea.value.substring(i, idx) + r;
    i = idx + q.length;
  }
  textarea.value = result;
  highlightMatches(); updateCount(); updateLineNumbers();
  status(T.allReplaced);
}
function findBarKey(e) {
  if (e.key === "Enter") { e.shiftKey ? findPrev() : findNext(); e.preventDefault(); }
  if (e.key === "Escape") closeFindBar();
}
function replaceBarKey(e) {
  if (e.key === "Enter") { doReplace(); e.preventDefault(); }
  if (e.key === "Escape") closeFindBar();
}

// ─── COPY ──────────────────────────────────────────────────────────────────────
function selectAndCopy() {
  textarea.select();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(textarea.value).then(() => status(T.copied)).catch(fallbackCopy);
  } else { fallbackCopy(); }
}
function fallbackCopy() {
  try { document.execCommand("copy"); status(T.copied); }
  catch(e) { status(T.copyFailed); }
}

// ─── PASTE ────────────────────────────────────────────────────────────────────
function pasteText() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(insertText).catch(() => status(T.longPress));
  } else {
    textarea.focus();
    if (!document.execCommand("paste")) status(T.longPress);
  }
}
function insertText(t) {
  const s = textarea.selectionStart;
  textarea.value = textarea.value.substring(0, s) + t + textarea.value.substring(textarea.selectionEnd);
  textarea.selectionStart = textarea.selectionEnd = s + t.length;
  updateCount(); updateLineNumbers();
}

// ─── WORD COUNT ───────────────────────────────────────────────────────────────
function updateCount() {
  const t = textarea.value.trim();
  document.getElementById("wordCount").textContent = t ? t.split(/\s+/).length : 0;
  document.getElementById("charCount").textContent = textarea.value.length;
}

// ─── CURSOR POS ───────────────────────────────────────────────────────────────
function updateCursor() {
  const lines = textarea.value.substr(0, textarea.selectionStart).split("\n");
  document.getElementById("cursorPos").textContent =
    `Ln ${lines.length}, Col ${lines[lines.length - 1].length + 1}`;
}

// ─── TAB ──────────────────────────────────────────────────────────────────────
textarea.addEventListener("keydown", e => {
  if (e.key === "Tab") {
    e.preventDefault();
    const s = textarea.selectionStart;
    textarea.value = textarea.value.substring(0, s) + "  " + textarea.value.substring(textarea.selectionEnd);
    textarea.selectionStart = textarea.selectionEnd = s + 2;
    updateLineNumbers();
  }
});

// ─── MISC ─────────────────────────────────────────────────────────────────────
function toggleDark() {
  const isDark = document.body.classList.toggle("dark");
  const btn = document.querySelector('[data-i18n="btnDark"]');
  if (btn) btn.innerHTML = isDark ? T.btnLight : T.btnDark;
}
function clearText() {
  const fname = document.getElementById("filename").value;
  textarea.value = ""; closeFindBar(); updateCount(); updateLineNumbers(); textarea.focus();
  document.getElementById("filename").value = fname;
}
function setZoom(n) {
  fontSize = n;
  textarea.style.fontSize = fontSize + "px";
  linenums.style.fontSize = fontSize + "px";
}
function zoomIn()    { setZoom(fontSize + 1); }
function zoomOut()   { setZoom(Math.max(6, fontSize - 1)); }
function zoomReset() { setZoom(14); }

function saveFile() {
  const blob = new Blob([textarea.value], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = document.getElementById("filename").value || "Untitled.txt";
  a.click();
}
function filePrompt() {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.onchange = e => {
    const file = e.target.files[0];
    document.getElementById("filename").value = file.name;
    const reader = new FileReader();
    reader.onload = evt => {
      textarea.value = evt.target.result;
      updateCount(); updateLineNumbers(); textarea.focus();
    };
    reader.readAsText(file);
  };
  inp.click();
}
function status(msg) {
  const s = document.getElementById("status");
  s.textContent = msg;
  setTimeout(() => s.textContent = "", 1800);
}
function selectFilename(el) {
  const dot = el.value.lastIndexOf(".");
  setTimeout(() => el.setSelectionRange(0, dot > 0 ? dot : el.value.length), 0);
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
textarea.addEventListener("input", () => {
  updateCount(); updateCursor(); updateLineNumbers();
  if (findbar.classList.contains("visible")) highlightMatches();
});
textarea.addEventListener("click", updateCursor);
textarea.addEventListener("keyup",  updateCursor);

document.addEventListener("keydown", e => {
  if (e.target === findInput || e.target === replaceInput) return;
  if (e.ctrlKey && e.key === "Enter")            { e.preventDefault(); selectAndCopy(); }
  if (e.key === "Escape")                        { e.preventDefault(); findbar.classList.contains("visible") ? closeFindBar() : clearText(); }
  if (e.ctrlKey && e.key === "f")                { e.preventDefault(); openFind(); }
  if (e.ctrlKey && e.key.toLowerCase() === "h") { e.preventDefault(); openReplace(); }
  if (e.ctrlKey && e.key.toLowerCase() === "o") { e.preventDefault(); filePrompt(); }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateCount();
updateCursor();

// Auto-detect browser language
(function() {
  const browserLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
  // Map browser codes to our supported keys
  const MAP = {
    en:"en", "en-us":"en", "en-gb":"en",
    es:"es", "es-es":"es", "es-mx":"es",
    zh:"zh", "zh-cn":"zh", "zh-tw":"zh", "zh-hk":"zh",
    ja:"ja",
    it:"it",
    ar:"ar", "ar-sa":"ar",
    de:"de",
    nl:"nl",
    hi:"hi",
    fr:"fr", "fr-fr":"fr",
    pt:"pt", "pt-br":"pt", "pt-pt":"pt",
    ru:"ru",
    tr:"tr",
    ko:"ko",
    he:"he",
    ga:"ga",
  };
  const detected = MAP[browserLang] || MAP[browserLang.split("-")[0]];
  if (detected && detected !== "en") {
    document.getElementById("uiLang").value = detected;
    applyLang(detected);
  }
})();
</script>
